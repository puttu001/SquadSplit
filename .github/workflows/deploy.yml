name: CI/CD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            echo "==> Pulling latest code"
            cd ~/SquadSplit
            git pull origin main

            echo "==> Installing dependencies"
            pnpm install --frozen-lockfile

            echo "==> Running DB migrations + generating Prisma client"
            cd apps/backend
            npx prisma migrate deploy --schema src/database/prisma/schema.prisma
            npx prisma generate --schema src/database/prisma/schema.prisma
            cd ~/SquadSplit

            echo "==> Building backend"
            cd apps/backend && pnpm build && cd ~/SquadSplit

            echo "==> Building frontend"
            cd apps/frontend && pnpm build && cd ~/SquadSplit

            echo "==> Publishing frontend to nginx root"
            sudo rsync -a --delete apps/frontend/dist/ /var/www/squadsplit/

            echo "==> Restarting backend"
            pm2 reload squadsplit-backend || pm2 start ecosystem.config.cjs --env production

            echo "==> Done"
